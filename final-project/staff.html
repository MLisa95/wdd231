<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta author="Lisakhanya Gasa">
    <meta description="A landing page for my final project">
    <title>Lisakhanya Gasa Final Project - Staff Page</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/staff.css">
    <script src="scripts/staff.js" defer></script>
</head>

<body>

    <header>
        <div class="logo">
            <img src="images/final-logo.png" alt="Logo for Mr E Tutoring Services">
            <h1>Mr. E Extra Tuition</h1>
        </div>

        <nav id="nav-menu" class="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="staff.html" class="active">Staff</a></li>
                <li><a href="join-us.html">Join</a></li> <!-- not form part of 3 pages 😭😭😭😭 -->
            </ul>
        </nav>
    </header>

    <main>
        <h2>Meet Our Team</h2>

        <div class="staff-controls">
            <div class="filter-group">
                <select id="gradeFilter">
                    <option value="">Filter by Grade</option>
                </select>
                <select id="subjectFilter">
                    <option value="">Filter by Subject</option>
                </select>
            </div>

            <div class="view-toggle">
                <button id="gridView" class="active">Grid</button>
                <button id="listView">List</button>
            </div>
        </div>

        <section id="staffContainer" class="grid-view"></section>

        <dialog id="staffModal">
            <div class="modal-content">
                <button id="closeModal" class="close-modal">❌</button>
                <h3 id="modalName"></h3> <!-- Name - Subjects teaching -->
                <p id="modalExperience"></p>
                <p id="modalContact"></p>
                <p id="modalQuote"></p>
            </div>
        </dialog>

    </main>

    <footer>
        <div class="footer-address">
            <p>92 Alexandra Rd</p>
            <p>Qonce</p>
            <p>5601</p>
        </div>

        <div class="footer-icons">
            <img src="images/icon-facebook.png" alt="Facebook Icon for Mr E Extra Tuition">
            <img src="images/icon-linkedin.png" alt="LinkedIn Icon for Mr E Extra Tuition">
            <img src="images/icon-whatsapp.png" alt="WhatsApp Icon for Mr E Extra Tuition">
        </div>

        <div class="my-details">
            <p>Lisakhanya Gasa</p>
            <p>WDD231 Final Project</p>
            <p>
                <a href="https://www.loom.com/share/50474b605ff74ecfaab3fe000c9f9384" 
               target="_blank" 
               rel="noopener noreferrer">
               Watch my project video
            </a>
            </p>
        </div>
    </footer>
</body>

</html>
